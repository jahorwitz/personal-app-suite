name: Deploy Orchestrator

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/deploy-*.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: deploy-orchestrator
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      infra-changed: ${{ steps.changes.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          # Detect what changed in this push
          if git diff --name-only HEAD~1 HEAD | grep -q -E '^(apps/shell/|packages/)'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend changes detected"
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No frontend changes"
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q -E '^apps/infra/'; then
            echo "infra=true" >> $GITHUB_OUTPUT
            echo "✅ Infrastructure changes detected"
          else
            echo "infra=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No infrastructure changes"
          fi

  # ============================================
  # PRODUCTION ENVIRONMENT DEPLOYMENTS
  # ============================================

  deploy-infrastructure-prod:
    name: Deploy Infrastructure (Prod)
    needs: detect-changes
    if: needs.detect-changes.outputs.infra-changed == 'true'
    uses: ./.github/workflows/deploy-infrastructure.yml
    secrets: inherit
    with:
      environment: prod

  deploy-frontend-prod:
    name: Deploy Frontend (Prod)
    needs: [detect-changes]
    if: |
      always() && 
      needs.detect-changes.outputs.frontend-changed == 'true'
    uses: ./.github/workflows/deploy-frontend.yml
    secrets: inherit
    with:
      environment: prod

  # ============================================
  # DEPLOYMENT SUMMARY
  # ============================================

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-infrastructure-prod
      - deploy-frontend-prod
    if: always()
    steps:
      - name: Generate deployment summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure: ${{ needs.detect-changes.outputs.infra-changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.detect-changes.outputs.frontend-changed }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Production Environment" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure: ${{ needs.deploy-infrastructure-prod.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-frontend-prod.result }}" >> $GITHUB_STEP_SUMMARY

          # Check for failures
          if [ "${{ needs.deploy-infrastructure-prod.result }}" == "failure" ] || \
             [ "${{ needs.deploy-frontend-prod.result }}" == "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Some deployments failed. Please review the logs above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All deployments completed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi
