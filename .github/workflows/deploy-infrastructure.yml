name: Deploy Infrastructure

on:
  pull_request:
    paths:
      - "apps/infra/**"
      - ".github/workflows/deploy-infrastructure.yml"
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - prod

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: deploy-infrastructure-${{ inputs.environment || github.event.inputs.environment || 'pr' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  cdk-diff:
    name: CDK Diff (Preview Changes)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: ${{ inputs.environment || github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set CDK environment variables
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
        run: |
          echo "CDK_DEFAULT_ACCOUNT=$CDK_DEFAULT_ACCOUNT" >> $GITHUB_ENV
          echo "CDK_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: Build CDK
        working-directory: apps/infra
        run: pnpm build

      - name: Generate CDK diff
        id: cdk-diff
        working-directory: apps/infra
        continue-on-error: true
        run: |
          npx cdk diff --context environment=prod --all 2>&1 | tee diff-output.txt
          echo "diff_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment PR with diff
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const diffPath = 'apps/infra/diff-output.txt';
            let diff = 'No diff output generated';

            if (fs.existsSync(diffPath)) {
              diff = fs.readFileSync(diffPath, 'utf8');
              // Truncate if too long for GitHub comment
              if (diff.length > 60000) {
                diff = diff.substring(0, 60000) + '\n\n... (truncated)';
              }
            }

            const exitCode = '${{ steps.cdk-diff.outputs.diff_exit_code }}';
            const status = exitCode === '0' ? '✅ No changes' : '📝 Changes detected';

            const body = `## CDK Diff - ${status}\n\n<details><summary>View diff</summary>\n\n\`\`\`\n${diff}\n\`\`\`\n\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: ${{ inputs.environment || github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set CDK environment variables
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
        run: |
          echo "CDK_DEFAULT_ACCOUNT=$CDK_DEFAULT_ACCOUNT" >> $GITHUB_ENV
          echo "CDK_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: Check CDK bootstrap
        working-directory: apps/infra
        run: |
          echo "Checking CDK bootstrap status..."
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "⚠️ CDK not bootstrapped. Run: npx cdk bootstrap"
            exit 1
          fi
          echo "✅ CDK bootstrap verified"

      - name: Build and deploy
        working-directory: apps/infra
        env:
          ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment }}
        run: |
          pnpm build
          npx cdk deploy \
            --context environment=$ENVIRONMENT \
            --all \
            --require-approval never \
            --concurrency 3 \
            --progress events

      - name: Save deployment outputs
        id: outputs
        env:
          ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment }}
        run: |
          aws cloudformation describe-stacks \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[?starts_with(StackName, `'$ENVIRONMENT'-`)].{Name:StackName, Outputs:Outputs}' \
            > deployment-outputs-$ENVIRONMENT.json

          echo "Deployment outputs saved"
          cat deployment-outputs-$ENVIRONMENT.json

      - name: Upload deployment outputs
        uses: actions/upload-artifact@v4
        env:
          ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment }}
        with:
          name: ${{ env.ENVIRONMENT }}-deployment-outputs
          path: deployment-outputs-${{ env.ENVIRONMENT }}.json
          retention-days: 90

  drift-detection:
    name: Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: deploy
    environment: ${{ inputs.environment || github.event.inputs.environment }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect stack drift
        env:
          ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment }}
        run: |
          STACKS="$ENVIRONMENT-Network $ENVIRONMENT-Database $ENVIRONMENT-Api $ENVIRONMENT-Frontend $ENVIRONMENT-Storybook"

          for stack in $STACKS; do
            echo "Checking drift for $stack..."
            
            if aws cloudformation describe-stacks --stack-name $stack > /dev/null 2>&1; then
              DRIFT_ID=$(aws cloudformation detect-stack-drift --stack-name $stack --query StackDriftDetectionId --output text)
              
              # Wait for drift detection to complete
              sleep 10
              
              STATUS=$(aws cloudformation describe-stack-drift-detection-status \
                --stack-drift-detection-id $DRIFT_ID \
                --query StackDriftStatus --output text)
              
              if [ "$STATUS" != "IN_SYNC" ]; then
                echo "::warning::Drift detected in $stack - Status: $STATUS"
              else
                echo "✅ $stack is in sync"
              fi
            else
              echo "⚠️ Stack $stack does not exist - skipping"
            fi
          done
